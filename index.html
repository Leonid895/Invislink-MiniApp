<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invis Link Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; 
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .accent-button {
            background-color: #2563eb;
            color: white;
        }
        #backdrop {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px); opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; z-index: 40;
        }
        #backdrop.visible { opacity: 1; pointer-events: auto; }
        #store-modal {
            position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b;
            border-top: 1px solid rgba(255, 255, 255, 0.1); transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50;
            padding-bottom: env(safe-area-bottom, 20px); border-radius: 1.5rem 1.5rem 0 0; padding: 1.5rem;
        }
        #store-modal.visible { transform: translateY(0); }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">
    <div id="app" class="max-w-md mx-auto w-full relative">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold tracking-tight">INVIS LINK</h1>
            <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/20 text-blue-400 border border-blue-500/30">
                ACTIVE
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 mb-6 text-center">
            <p class="text-slate-400 text-sm mb-2">Осталось времени</p>
            <h2 id="expiry-date" class="text-3xl font-black mb-4 tracking-tight">Загрузка...</h2>
            
            <button id="trial-btn" onclick="activateTrial()" class="hidden w-full mb-3 py-3 rounded-xl text-sm font-bold bg-gradient-to-r from-green-500 to-emerald-600 text-white transition-all active:scale-95 shadow-lg shadow-green-500/20">
                🎁 Пробные 24 часа
            </button>

            <button id="main-action-btn" onclick="openStore()" class="w-full mb-4 py-3 rounded-xl text-sm font-bold bg-white/10 text-white hover:bg-white/20 transition-all border border-white/10 active:scale-95">
                ✨ Продлить подписку
            </button>

            <div class="bg-black/40 rounded-2xl p-4 mb-4 break-all text-[10px] font-mono border border-white/5 text-slate-300">
                <span id="vpn-key">Ожидание данных...</span>
            </div>
            
            <button id="copy-btn" onclick="copyKey()" class="accent-button w-full py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                Копировать ключ
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card rounded-2xl p-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Рефералы</p>
                <p id="ref-count" class="text-xl font-bold">0</p>
            </div>
            <div class="glass-card rounded-2xl p-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Бонус</p>
                <p class="text-xl font-bold text-green-400">+7 дней</p>
            </div>
        </div>
    </div>

    <div id="backdrop" onclick="closeStore()"></div>

    <div id="store-modal" class="shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">Выберите тариф</h3>
            <button onclick="closeStore()" class="text-slate-400 hover:text-white p-2 text-2xl leading-none">&times;</button>
        </div>
        <div class="space-y-3">
            <button onclick="buyTariff('sub_1m')" class="w-full flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5 hover:border-blue-500/50 transition-all active:scale-95">
                <span class="font-semibold text-slate-200">Standard — 1 мес</span>
                <span class="font-bold text-yellow-400">150 ⭐</span>
            </button>
            <button onclick="buyTariff('sub_3m')" class="w-full flex justify-between items-center bg-black/40 p-4 rounded-xl border border-blue-500/30 hover:border-blue-500 transition-all active:scale-95 shadow-[0_0_15px_rgba(37,99,235,0.1)]">
                <span class="font-semibold text-white">Optimal — 3 мес</span>
                <span class="font-bold text-yellow-400">400 ⭐</span>
            </button>
            <button onclick="buyTariff('sub_1y')" class="w-full flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5 hover:border-blue-500/50 transition-all active:scale-95">
                <span class="font-semibold text-slate-200">Premium — 1 год</span>
                <span class="font-bold text-yellow-400">1200 ⭐</span>
            </button>
            <button onclick="buyTariff('sub_2y')" class="w-full flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5 hover:border-blue-500/50 transition-all active:scale-95">
                <span class="font-semibold text-slate-200">Ultra — 2 года</span>
                <span class="font-bold text-yellow-400">2000 ⭐</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const userId = tg.initDataUnsafe.user?.id || 5501746658;
        const BASE_URL = 'https://89.104.68.109.nip.io:8443';

        function formatRemainingTime(expireStr) {
            if (!expireStr || expireStr === "Не активна" || expireStr === "-") return "Не активна";
            try {
                const parts = expireStr.split(' ');
                if (parts.length !== 2) return expireStr;
                const dateParts = parts[0].split('-');
                const timeParts = parts[1].split(':');
                const expireDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2], timeParts[0], timeParts[1]);
                const diff = expireDate - new Date();
                if (diff <= 0) return "Истекла";
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                return `${days}д ${hours}ч`;
            } catch (e) { return expireStr; }
        }

        async function loadUserData() {
            try {
                const response = await fetch(`${BASE_URL}/api/user/${userId}`);
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                
                document.getElementById('expiry-date').innerText = formatRemainingTime(data.expire_at);
                document.getElementById('ref-count').innerText = data.ref_count;
                
                // Умная логика интерфейса
                const hasKey = data.vpn_key && data.vpn_key !== "Ключ не создан";
                
                if (hasKey) {
                    document.getElementById('vpn-key').innerText = data.vpn_key;
                    document.getElementById('copy-btn').classList.remove('hidden');
                    document.getElementById('main-action-btn').innerText = '✨ Продлить подписку';
                } else {
                    document.getElementById('vpn-key').innerText = 'Оформите подписку для получения ключа';
                    document.getElementById('copy-btn').classList.add('hidden');
                    document.getElementById('main-action-btn').innerText = '💳 Приобрести подписку';
                }

                // Показываем кнопку триала, только если он не был использован
                if (data.trial_used === 0 && !hasKey) {
                    document.getElementById('trial-btn').classList.remove('hidden');
                } else {
                    document.getElementById('trial-btn').classList.add('hidden');
                }
                
            } catch (e) { console.error(e); }
        }

        async function activateTrial() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.MainButton.showProgress();
            try {
                const response = await fetch(`${BASE_URL}/api/trial/${userId}`, { method: 'POST' });
                if (!response.ok) throw new Error('Trial Error');
                
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("✅ Пробный период успешно активирован!");
                loadUserData(); // Перезагружаем интерфейс
            } catch (e) {
                tg.showAlert("❌ Ошибка или пробный период уже использован.");
            } finally {
                tg.MainButton.hideProgress();
            }
        }

        function copyKey() {
            const key = document.getElementById('vpn-key').innerText;
            if (key.startsWith('vless://')) {
                navigator.clipboard.writeText(key);
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Ключ успешно скопирован!");
            }
        }

        function openStore() {
            document.getElementById('backdrop').classList.add('visible');
            document.getElementById('store-modal').classList.add('visible');
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeStore() {
            document.getElementById('backdrop').classList.remove('visible');
            document.getElementById('store-modal').classList.remove('visible');
        }

        async function buyTariff(tariffId) {
            tg.HapticFeedback.impactOccurred('medium');
            closeStore();
            tg.MainButton.showProgress();
            try {
                const response = await fetch(`${BASE_URL}/api/invoice/${userId}/${tariffId}`);
                if (!response.ok) throw new Error('Invoice Error');
                const data = await response.json();
                tg.MainButton.hideProgress();
                tg.openInvoice(data.link, function(status) {
                    if (status === 'paid') {
                        tg.HapticFeedback.notificationOccurred('success');
                        tg.showAlert("✅ Оплата прошла успешно! Подписка продлена.");
                        loadUserData(); 
                    } else if (status === 'failed') {
                        tg.showAlert("❌ Ошибка при оплате.");
                    }
                });
            } catch (e) {
                tg.MainButton.hideProgress();
                tg.showAlert("Ошибка сервера при создании счета.");
            }
        }

        loadUserData();
    </script>
</body>
</html>
