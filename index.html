<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invis Link Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, white);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .accent-button {
            background-color: var(--tg-theme-button-color, #2563eb);
            color: var(--tg-theme-button-text-color, white);
        }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold tracking-tight">INVIS LINK</h1>
            <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/20 text-blue-400 border border-blue-500/30">
                ACTIVE
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 mb-6 text-center">
            <p class="text-slate-400 text-sm mb-2">Осталось времени</p>
            <h2 id="expiry-date" class="text-3xl font-black mb-4 tracking-tight">Загрузка...</h2>
            
            <div class="bg-black/30 rounded-2xl p-4 mb-4 break-all text-[10px] font-mono border border-white/5 text-slate-300">
                <span id="vpn-key">Ожидание данных...</span>
            </div>
            
            <button onclick="copyKey()" class="accent-button w-full py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                Копировать ключ
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card rounded-2xl p-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Рефералы</p>
                <p id="ref-count" class="text-xl font-bold">0</p>
            </div>
            <div class="glass-card rounded-2xl p-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Бонус</p>
                <p class="text-xl font-bold">+7 дней</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Неубиваемая функция парсинга даты для любых телефонов
        function formatRemainingTime(expireStr) {
            if (!expireStr || expireStr === "Не активна" || expireStr === "-") return "Не активна";
            
            try {
                // Разбиваем "2028-08-29 10:21" на части
                const parts = expireStr.split(' ');
                if (parts.length !== 2) return expireStr;

                const dateParts = parts[0].split('-');
                const timeParts = parts[1].split(':');

                // Создаем дату (месяцы в JS идут с 0, поэтому -1)
                const expireDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2], timeParts[0], timeParts[1]);
                const now = new Date();
                const diff = expireDate - now;

                if (diff <= 0) return "Истекла";

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

                return `${days}д ${hours}ч`;
            } catch (e) {
                console.error("Date parse error:", e);
                return expireStr; // Если что-то пошло не так, вернем как есть
            }
        }

        async function loadUserData() {
            const userId = tg.initDataUnsafe.user?.id || 5501746658;
            const API_URL = `https://89.104.68.109.nip.io:8443/api/user/${userId}`;

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                
                document.getElementById('expiry-date').innerText = formatRemainingTime(data.expire_at);
                document.getElementById('vpn-key').innerText = data.vpn_key;
                document.getElementById('ref-count').innerText = data.ref_count;
                
            } catch (e) {
                console.error(e);
                document.getElementById('expiry-date').innerText = "Ошибка API";
            }
        }

        function copyKey() {
            const key = document.getElementById('vpn-key').innerText;
            if (key.startsWith('vless://')) {
                navigator.clipboard.writeText(key);
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Ключ успешно скопирован!");
            }
        }

        loadUserData();
    </script>
</body>
</html>
