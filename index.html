<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invis Link Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Темно-синий фон */
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold tracking-tight">INVIS LINK</h1>
            <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-semibold bg-green-500/20 text-green-400 border border-green-500/30">
                ACTIVE
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 mb-6 text-center">
            <p class="text-slate-400 text-sm mb-2">Осталось времени</p>
            <h2 id="expiry-date" class="text-3xl font-black mb-4">12д 04ч</h2>
            
            <div class="bg-slate-900/50 rounded-2xl p-4 mb-4 break-all text-xs font-mono border border-white/5">
                <p id="vpn-key" class="text-slate-300">vless://...copying...</p>
            </div>
            
            <button onclick="copyKey()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all">
                Копировать ключ
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card rounded-2xl p-4 text-center">
                <p class="text-xs text-slate-400">Рефералы</p>
                <p id="ref-count" class="text-xl font-bold">5</p>
            </div>
            <div class="glass-card rounded-2xl p-4 text-center">
                <p class="text-xs text-slate-400">Бонус</p>
                <p class="text-xl font-bold">+7 дней</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Здесь будет логика загрузки данных из нашего API
        async function loadUserData() {
            const userId = tg.initDataUnsafe.user?.id || 5501746658; // Твой ID для теста
            try {
                const response = await fetch(`http://ТВОЙ_IP:8000/api/user/${userId}`);
                const data = await response.json();
                
                document.getElementById('vpn-key').innerText = data.vpn_key || "Ключ не активен";
                document.getElementById('expiry-date').innerText = data.expire_at || "—";
                document.getElementById('ref-count').innerText = data.ref_count;
            } catch (e) {
                console.error("Ошибка загрузки данных");
            }
        }

        function copyKey() {
            const key = document.getElementById('vpn-key').innerText;
            navigator.clipboard.writeText(key);
            tg.HapticFeedback.notificationOccurred('success');
        }

        loadUserData();
    </script>
</body>
</html>
